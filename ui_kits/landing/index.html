<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Core Physio Clinic — Move Better. Live Pain Free.</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--white); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--teal-200); }

  /* scroll reveal */
  [data-reveal] { opacity: 0; transform: translateY(22px); transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out); transition-delay: var(--d, 0ms); }
  [data-reveal].is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { [data-reveal] { opacity: 1 !important; transform: none !important; } }

  /* responsive */
  @media (max-width: 920px) {
    .lp-nav { display: none !important; }
    .lp-hero-grid, .lp-2col { grid-template-columns: 1fr !important; }
    .lp-grid-3 { grid-template-columns: 1fr 1fr !important; }
    .lp-journey { grid-template-columns: 1fr 1fr !important; }
    .lp-journey-line { display: none !important; }
    .lp-footer { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .lp-gallery { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 560px) {
    .lp-hide-sm { display: none !important; }
    .lp-grid-3, .lp-journey, .lp-gallery, .lp-footer { grid-template-columns: 1fr !important; }
  }
</style>
</head>

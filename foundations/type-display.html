<!DOCTYPE html>
<html lang="en"><head><meta name="robots" content="noindex, nofollow"/><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);padding:26px;color:var(--text-heading);}
  .item{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border);}
  .item:last-child{border:none;}
  .meta{width:84px;flex:0 0 auto;font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .s{font-weight:800;letter-spacing:-0.02em;line-height:1.05;}
</style></head><body>
  <div class="item"><span class="meta">5xl · 68</span><span class="s" style="font-size:var(--text-5xl)">Move Better</span></div>
  <div class="item"><span class="meta">3xl · 44</span><span class="s" style="font-size:var(--text-3xl)">Pain-Free Living</span></div>
  <div class="item"><span class="meta">2xl · 36</span><span class="s" style="font-size:var(--text-2xl)">Our Services</span></div>
  <div class="item"><span class="meta">xl · 28</span><span class="s" style="font-size:var(--text-xl)">Why Patients Trust Us</span></div>
</body></html>

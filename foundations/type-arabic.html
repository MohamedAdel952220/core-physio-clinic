<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-arabic);background:var(--grad-mint);padding:28px;color:var(--text-heading);display:flex;flex-direction:column;gap:12px;}
  .display{font-size:42px;font-weight:700;letter-spacing:0;line-height:1.2;}
  .accent{color:var(--teal-600);}
  .sub{font-size:19px;color:var(--text-strong);line-height:1.7;}
  .tag{font-size:15px;color:var(--text-muted);}
</style></head><body>
  <div class="display">استعد حركتك <span class="accent">بدون ألم</span></div>
  <div class="sub">طريقك لحياة أكثر راحة وحركة بدون ألم</div>
  <div class="tag">خدمات علاج طبيعي وإعادة تأهيل احترافية في الشيخ زايد</div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x150" name="Teal — Primary / Healing" subtitle="Core brand scale, teal-600 is primary" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);padding:22px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px;}
  .sw b{font-size:12px;font-weight:700;}
  .sw span{font-size:10.5px;opacity:.8;font-variant-numeric:tabular-nums;}
  .dark{color:#fff;} .lite{color:var(--ink-800);}
</style></head><body>
<div class="row">
  <div class="sw dark" style="background:var(--teal-900)"><b>900</b><span>#073B36</span></div>
  <div class="sw dark" style="background:var(--teal-700)"><b>700</b><span>#0A6F64</span></div>
  <div class="sw dark" style="background:var(--teal-600)"><b>600 ●</b><span>#0D8E80</span></div>
  <div class="sw dark" style="background:var(--teal-500)"><b>500</b><span>#16A99A</span></div>
  <div class="sw lite" style="background:var(--teal-300)"><b>300</b><span>#82D7CD</span></div>
  <div class="sw lite" style="background:var(--teal-100)"><b>100</b><span>#DCF2EF</span></div>
  <div class="sw lite" style="background:var(--teal-50);box-shadow:inset 0 0 0 1px var(--border)"><b>50</b><span>#EEF8F6</span></div>
</div>
</body></html>

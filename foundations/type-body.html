<!DOCTYPE html>
<html lang="en"><head><meta name="robots" content="noindex, nofollow"/><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);padding:26px;color:var(--text-heading);display:flex;flex-direction:column;gap:14px;}
  .eyebrow{font-size:var(--text-xs);font-weight:700;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--teal-600);}
  .lead{font-size:var(--text-md);line-height:var(--lh-relaxed);color:var(--text-strong);max-width:560px;}
  .body{font-size:var(--text-base);line-height:var(--lh-relaxed);color:var(--text-body);max-width:560px;}
  .weights{display:flex;gap:20px;font-size:22px;}
  .weights span{letter-spacing:-0.01em;}
</style></head><body>
  <div class="eyebrow">Rehabilitation &amp; Recovery</div>
  <div class="lead">Personalized treatment plans designed for long-term recovery and wellness.</div>
  <div class="body">At Core Physio Clinic we restore movement, relieve pain, and help every patient return to daily life with confidence.</div>
  <div class="weights">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">Semibold</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:800">Black</span>
  </div>
</body></html>

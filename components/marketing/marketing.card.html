<html lang="en">
<head>

  .wrap { padding: 26px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 18px; align-items: stretch; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="/_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { ServiceCard, ReviewCard } = window.DesignSystem_155140;
  const Activity = () => <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 12h4l2.5-7 5 14 2.5-7H21" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  function Demo() {
    return (
      <>
        <ServiceCard icon={<Activity/>} title="Sports Injury Rehabilitation"
          description="Evidence-based recovery programs to get athletes back to full performance safely." />
        <ReviewCard name="Iman Khaled" rating={5}
          quote="Great management and very clean facility. Dr. Hadeel Ibrahim is amazing — professional, knowledgeable and trustworthy." />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
